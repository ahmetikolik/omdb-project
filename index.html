<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Search movies, series and episodes via the OMDB API." />
  <title>Movie Finder · OMDB</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🍿%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">🍿</span>
      <span class="brand-name">Movie Finder</span>
    </div>
    <span class="brand-tag">powered by OMDB</span>
  </header>

  <main class="page">
    <!-- Search bar -->
    <section class="search-card">
      <div class="search-row">
        <input type="text" id="query" placeholder="Search a movie, series, or episode…" autocomplete="off" />
        <button id="searchBtn" type="button">Search</button>
      </div>
      <div class="filters">
        <label>
          <span>Type</span>
          <select id="typeFilter">
            <option value="">Any</option>
            <option value="movie">Movie</option>
            <option value="series">Series</option>
            <option value="episode">Episode</option>
          </select>
        </label>
        <label>
          <span>Year</span>
          <input type="number" id="yearFilter" placeholder="e.g. 2010" min="1900" max="2100" />
        </label>
        <button id="clearBtn" type="button" class="ghost">Clear</button>
      </div>
    </section>

    <p id="status" class="status"></p>

    <section id="grid" class="grid"></section>

    <!-- Detail dialog -->
    <div id="dialog" class="dialog hidden" role="dialog" aria-modal="true">
      <div class="dialog-card">
        <button id="dialogClose" class="dialog-close" aria-label="Close">×</button>
        <div id="dialogBody"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>Built by <a href="https://github.com/ahmetikolik" target="_blank" rel="noopener">Ahmet Yıldırım</a> ·
       data from <a href="https://www.omdbapi.com/" target="_blank" rel="noopener">OMDB</a></p>
  </footer>

  <!-- Modules: api wraps OMDB calls; app handles UI + storage -->
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
